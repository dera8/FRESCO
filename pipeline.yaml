# =====================================================
# AutoPBR v2 — Frozen ECCV Configuration
# Replicates the exact experimental setup used in v2.1_filtered
# =====================================================

# =========================
# GLOBAL PATHS
# =========================
paths:
  photos_dir: photos_canary
  output_root: data_output_canary

# =========================
# ENVIRONMENT
# =========================
env:
  required:
    - NVIDIA_API_KEY

# =========================
# STEP 1 — SAM3 SEGMENTATION
# =========================
sam3:
  enabled: true
  script: sam3_v3.py

  classes:
    wall:
      - "building facade"
      - "wall"
      - "building front"

    roof:
      - "building roof"
      - "roof"

    window:
      - "window"
      - "glass window"

    door:
      - "door"
      - "entrance"
      - "building door"

    road:
      - "road"
      - "street"
      - "road surface"
      - "asphalt road"
      - "driveway"
      - "sidewalk"
      - "pavement"
      - "footpath"
      - "walkway"
      - "pedestrian walkway"

  per_building: true

  # Far-building gating (geometric filtering)
  min_inst_bbox_h_wall: 70
  min_inst_bbox_h_roof: 110

  out_dir: "{output_root}/sam3_instances"
  images_dir: "{photos_dir}"
  pattern: "*.jpg"
  score_thr: 0.6
  mask_thr: 0.5

# =========================
# STEP 2 — PROXY SEMANTIC CHECK
# =========================
proxy_check:
  enabled: true
  script: proxy_semantic_check.py
  out_dir: "{output_root}/sam3_instances"
  manifest: "{output_root}/sam3_instances/manifest.json"

# =========================
# STEP 3 — NEMOTRON STRUCTURED
# =========================
#version: v2.1_filtered
nemotron_structured:
  enabled: true
  script: nemotron_building_priors.py

  model: nvidia/llama-3.1-nemotron-nano-vl-8b-v1
  canon_mode: soft
  per_building: true
  skip_far_buildings: true

  manifest: "{output_root}/sam3_instances/manifest.json"
  masked_dir: "{output_root}/masked_rgb"
  out_json: "{output_root}/materials_full_filtered.json"

  # Coverage thresholds
  min_cov: 1.0
  min_cov_roof: 1.5
  min_cov_building: 0.5
  min_cov_roof_building: 0.5
  roof_conf_threshold: 0.6

  # Cropping policy
  crop_pad: 24
  min_crop_side: 64

  # Retry / API robustness
  max_retries: 3
  retry_backoff: 0.8

# =========================
# STEP 4 — BASELINE FULL IMAGE
# =========================
nemotron_baseline:
  enabled: true
  script: nemotron_fullimage.py

  model: nvidia/llama-3.1-nemotron-nano-vl-8b-v1
  prompt_type: two_pass_json_review
  source_manifest: "{output_root}/sam3_instances/manifest.json"
  output_json: "{output_root}/baseline_full_image.json"

# =========================
# STEP 5 — VALIDATION
# =========================
validation:
  enabled: true
  script: validator.py

  structured_json: "{output_root}/materials_full_filtered.json"
  baseline_json: "{output_root}/baseline_full_image.json"
  out_csv: "{output_root}/validation_results/report.csv"

annotations:
  enabled: true
  script: gui_annotator.py

det_metrics:
  enabled: true
  script: evaluate_detection.py

  baseline_json: "{output_root}/baseline_full_image.json"
  structured_json: "{output_root}/materials_full_filtered.json"
  gt_json: "{output_root}/ground_truth_eval.json"

nlp_material_replacement:
  enabled: true
  script: generation_test.py

  json: "{output_root}/ground_truth_eval.json"

gen_bench:
  enabled: true
  script: generate_benchmark_set.py

  benchmark_json: "{output_root}/benchmark_dataset.json"
  output_dir: "{output_root}/benchmark_results"
  gt_json: "{output_root}/ground_truth_eval.json"

gen_metrics:
  enabled: true
  script: evaluate_generation.py

  benchmark_json: "{output_root}/benchmark_dataset.json"