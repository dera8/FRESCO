# =====================================================
# AutoPBR v2 — Frozen ECCV Configuration
# Replicates the exact experimental setup used in v2.1_filtered
# =====================================================

# =========================
# GLOBAL PATHS
# =========================
paths:
  photos_dir: photos2
  output_root: data_output

# =========================
# ENVIRONMENT
# =========================
env:
  required:
    - NVIDIA_API_KEY

# =========================
# STEP 1 — SAM3 SEGMENTATION
# =========================
sam3:
  enabled: true
  script: 2_sam3hi.py

  classes:
    wall:
      - "building facade"
      - "wall"
      - "building front"

    roof:
      - "building roof"
      - "roof"

    road:
      - "road"
      - "street"
      - "road surface"
      - "asphalt road"
      - "driveway"
      - "sidewalk"
      - "pavement"
      - "footpath"
      - "walkway"
      - "pedestrian walkway"

  per_building: true

  # Far-building gating (geometric filtering)
  min_inst_bbox_h_wall: 70
  min_inst_bbox_h_roof: 110

  out_dir: "{output_root}/sam3_instances"

# =========================
# STEP 2 — PROXY SEMANTIC CHECK
# =========================
proxy_check:
  enabled: true
  script: 3_proxy_semantic_check.py
  sam_dir: "{output_root}/sam3_instances"
  manifest_out: "{output_root}/sam3_instances/manifest.json"

# =========================
# STEP 3 — NEMOTRON STRUCTURED
# =========================
nemotron_structured:
  enabled: true
  script: 4_nemotron_building_priors.py

  model: nvidia/llama-3.1-nemotron-nano-vl-8b-v1
  version: v2.1_filtered
  canon_mode: soft
  per_building: true
  skip_far_buildings: true

  manifest: "{output_root}/sam3_instances/manifest.json"
  masked_dir: "{output_root}/masked_rgb"
  output_json: materials_v2_filtered.json

  # Coverage thresholds
  min_cov_global_pct: 1.0
  min_cov_roof_pct: 1.5
  min_cov_building_pct: 0.5
  min_cov_roof_building_pct: 0.5
  roof_conf_threshold: 0.6

  # Cropping policy
  crop_pad: 24
  min_crop_side: 64

  # Retry / API robustness
  max_retries: 3
  retry_backoff: 0.8

# =========================
# STEP 4 — BASELINE FULL IMAGE
# =========================
nemotron_baseline:
  enabled: true
  script: 5_nemotron_fullimage.py

  model: nvidia/llama-3.1-nemotron-nano-vl-8b-v1
  prompt_type: two_pass_json_review
  source_manifest: "{output_root}/sam3_instances/manifest.json"
  output_json: baseline_full_image.json

# =========================
# STEP 5 — VALIDATION
# =========================
validation:
  enabled: true
  script: validator.py

  structured_json: materials_v2_filtered.json
  baseline_json: baseline_full_image.json
  out_csv: "{output_root}/validation_results/report.csv"
