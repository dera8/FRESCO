# AutoPBR Pipeline Configuration
# Complete configuration for running the full pipeline

# Input paths
input:
  osm_file: null  # Optional: Path to OSM file (if building footprints needed)
  photos_dir: photos
  photos_manifest: null  # Optional: CSV with image_id, lat, lon, heading
  buildings_geojson: null  # Optional: Pre-existing buildings GeoJSON

# Output directories
output:
  parts_dir: parts
  outputs_dir: outputs

# Step 1: Building extraction (if needed)
buildings:
  enabled: false  # Set to true if extracting from OSM
  max_distance: 100  # Maximum distance for image-building association (meters)

# Step 3: Segmentation (SegFormer)
segmentation:
  device: cpu  # cpu or cuda
  window_min_area: 0.001  # Minimum area ratio for window
  door_min_area: 0.002    # Minimum area ratio for door
  wall_min_area: 0.01     # Minimum area ratio for wall

# Step 4: Window detection boost (OWL-ViT)
window_detection:
  enabled: true
  device: cpu  # cpu or cuda (cuda recommended)
  max_side: 1024  # Resize images to this max dimension
  score_threshold: 0.25
  iou_wall_threshold: 0.5  # Minimum overlap with wall mask
  nms_threshold: 0.5
  skip_if_has_windows: true  # Skip images that already have windows

# Step 5: Material classification (CLIP)
classification:
  device: cpu  # cpu or cuda
  confidence_threshold: 0.3  # Minimum confidence for non-unknown
  margin_threshold: 0.1      # Minimum margin between top-2 predictions

# Step 6: Aggregation to building level
aggregation:
  enabled: true  # Requires image-to-building links
  use_distance_weighting: true

# Step 7: Fallback rules
fallback:
  rules_file: configs/rules.yaml

# Step 8: Export formats
export:
  unreal:
    enabled: true
    output_file: outputs/autopbr_assignments.csv
  
  urmat:
    enabled: true
    output_file: outputs/urmat_materials.json

# Advanced options
advanced:
  batch_size: 1  # Number of images to process in parallel
  num_workers: 1  # Number of worker threads
  cache_models: true  # Keep models in memory between steps
  verbose: true
